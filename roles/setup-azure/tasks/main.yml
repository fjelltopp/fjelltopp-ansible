---
# This should be run first, as the Key Vault and Registry are needed for the AKS setup and the Azure pipelines
# Uses shared_* variables for resources shared between staging and production

- name: Get tenant_id for later
  command: az account show --query tenantId -o tsv
  register: tenant_id_output
  changed_when: false

- name: Set tenant_id fact
  set_fact:
    azure_tenant_id: "{{ tenant_id_output.stdout | trim }}"

- name: Create a resource group
  azure_rm_resourcegroup:
    name: "{{ shared_resource_group_name }}"
    location: "{{ azure_region }}"

- name: Create an azure container registry
  azure_rm_resource:
    resource_group: "{{ shared_resource_group_name }}"
    provider: ContainerRegistry
    resource_type: registries
    resource_name: "{{ shared_acr_name }}"
    api_version: "2023-07-01"
    body:
      location: "{{ azure_region }}"
      sku:
        name: Basic
      properties:
        adminUserEnabled: true

- name: Create key vault
  azure_rm_resource:
    resource_group: "{{ shared_resource_group_name }}"
    provider: KeyVault
    resource_type: vaults
    resource_name: "{{ shared_vault_name }}"
    api_version: "2023-07-01"
    body:
      location: "{{ azure_region }}"
      properties:
        tenantId: "{{ azure_tenant_id }}"
        sku:
          family: A
          name: standard
        accessPolicies:
          # Allow Ansible to read/write secrets
          - tenantId: "{{ azure_tenant_id }}"
            objectId: "{{ vault_object_id }}"
            permissions:
              secrets:
                - set
                - get
                - list

# We have a KeyVault so can now get/generate the secrets we need to start
# These are shared secrets (no environment prefix)
- name: Set list of secrets to handle
  set_fact:
    secrets:
      # ANSIBLE_NAME: AZURE-KEYVAULT-NAME
      ckan_superuser_password: ckan-superuser-password
      azure_db_admin_password: azure-db-admin-password
- name: Init missing secrets
  block:
    # Key Vault URI follows standard pattern
    - name: Set key vault URI fact
      set_fact:
        keyvaulturi: "https://{{ shared_vault_name }}.vault.azure.net/"

    - name: loop through secrets
      include_tasks: roles/azure-secrets/azure-keyvault-loop-secrets.yml
      loop: "{{ secrets | dict2items(key_name='secret_key', value_name='vault_secret_key')  }}"
