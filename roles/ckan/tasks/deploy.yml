---
- name: Create CKAN namespace
  kubernetes.core.k8s:
    name: "{{ application_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: "{{ kubeconfig }}"
  become: false

- set_fact:
    storageClassName: "efs-client"

- name: obtain ACM certficate info
  community.aws.aws_acm_info:
    aws_region: "{{ aws_region }}"
    domain_name: "{{ ckan_tls_name }}"
  when: ckan_tls_name is defined
  register: certificate_acm
  become: false

- name: Display ACM arn
  ansible.builtin.debug:
    var: certificate_acm.certificates[0].certificate_arn
  when: show_debug_output is defined

- name: Get information about an RDS CKAN instance
  community.aws.rds_instance_info:
    region: "{{ aws_region }}"
    db_instance_identifier: "{{ application_namespace }}-rds"
  when: fjelltopp_env_type != 'local'
  register: ckan_rds_info

- name: Deploy Ingress
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'templates/kubernetes/{{ item }}') | from_yaml_all|list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  with_items:
    - nginx-ingress-tls-elb_v1_0_0.yaml
  when: ckan_tls_name is defined

- name: Patch Minikube ingress
  kubernetes.core.k8s:
    state: patched
    definition: "{{ lookup('template', 'templates/kubernetes/{{ item }}') | from_yaml_all|list }}"
    namespace: "ingress-nginx"
    name: "ingress-nginx-controller"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  with_items:
    - local_ingress_patch.yaml
  when: fjelltopp_env_type == 'local'

- name: Open internal services on Minikube
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'templates/kubernetes/{{ item }}') | from_yaml_all|list }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  with_items:
    - local_ingress.yaml
  when: fjelltopp_env_type == 'local'

- name: Setup Database
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'templates/kubernetes/{{ item }}') | from_yaml_all|list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  with_items:
    - db.yaml
  when: fjelltopp_env_type == 'local'

- name: Check if DB is alive [local] (10 tries, 5sec interval)
  community.postgresql.postgresql_ping:
    db: ckan
    login_host: "{{ ckan_fqdn }}"
    login_user: "ckan"
    login_password: "{{ ckan_postgres_password }}"
  when: (fjelltopp_env_type == 'local')
  register: db_ping_result
  retries: 10
  delay: 5
  until: db_ping_result is defined and db_ping_result.get('is_available')
  failed_when: db_ping_result is not defined or not db_ping_result.is_available
  # For this check to work psycopg2 must be installed for the venv python referenced from your inventory

- name: Setup database parameters
  set_fact:
    ckan_rds_admin_pw: "{{ lookup('aws_secret', application_namespace + '_rds_admin_pw' , region = aws_region ) }}"
    ckan_ds_ro_pass: "{{ lookup('aws_secret', application_namespace + '_datastore_ro_dbuser_password' , region = aws_region ) }}"
    ckan_ds_rw_pass: "{{ lookup('aws_secret', application_namespace + '_datastore_dbuser_password' , region = aws_region ) }}"
    ckan_db_hostname: "{{ ckan_rds_info.instances[0].endpoint.address }}"
  when: fjelltopp_env_type != 'local'

# Based on https://fjelltopp.atlassian.net/wiki/spaces/ADR/pages/1409032/ADR+Backup+restore
- name: Init CKAN schema in RDS
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'templates/kubernetes/{{ item }}') | from_yaml_all|list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  with_items:
    - ckandb_job.yaml
  when: (fjelltopp_env_type != 'local')

- name: Deploy CKAN
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'templates/kubernetes/{{ item }}') | from_yaml_all|list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  with_items:
    - solr.yaml
    - datapusher.yaml
    - redis.yaml
    - giftless.yaml
    - giftless_ingress.yaml
    - ckan_volumes.yaml
    - ckan.yaml
    - ckan_ingress.yaml
    - ckan_cronjob.yaml

- name: Wait for CKAN deployment to be ready
  kubernetes.core.k8s_info:
    kind: Deployment
    name: ckan
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  become: false

- name: Get CKAN pod name
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
    label_selectors:
      - app=ckan
    field_selectors:
      - status.phase=Running
  become: false
  register: ckan_pods

# The ckan_admin_api_token is initially a random placeholder generated by secrets.yml.
# CKAN 2.10+ removed old-style API keys in favour of JWT tokens, so the placeholder
# is not usable for authentication. Here we detect a non-JWT value and replace it with
# a real token generated inside the running pod, then store it in Secrets Manager and
# redeploy the CronJob so that email/phone notification scheduling works correctly.
- name: Check whether stored CKAN admin token is a valid JWT
  set_fact:
    ckan_admin_api_token_needs_rotation: "{{ not (ckan_admin_api_token | default('') | regex_search('^eyJ')) }}"
  when: fjelltopp_env_type != 'local'

- name: Generate new CKAN admin JWT API token
  kubernetes.core.k8s_exec:
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
    pod: "{{ ckan_pods.resources[0].metadata.name }}"
    command: ckan --config /etc/ckan/production.ini user token add admin notifications-cronjob
  become: false
  register: new_jwt_result
  when: fjelltopp_env_type != 'local' and ckan_admin_api_token_needs_rotation

- name: Extract JWT from token-add output
  set_fact:
    ckan_admin_api_token: "{{ new_jwt_result.stdout | regex_search('eyJ[A-Za-z0-9._-]+') }}"
  when: fjelltopp_env_type != 'local' and ckan_admin_api_token_needs_rotation

- name: Store new JWT in Secrets Manager
  community.aws.aws_secret:
    region: "{{ aws_region }}"
    name: "{{ application_namespace }}_ckan_admin_api_token"
    state: present
    secret_type: "string"
    secret: "{{ ckan_admin_api_token }}"
  become: false
  when: fjelltopp_env_type != 'local' and ckan_admin_api_token_needs_rotation

- name: Redeploy CronJob with valid JWT token
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'templates/kubernetes/ckan_cronjob.yaml') | from_yaml_all | list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  when: fjelltopp_env_type != 'local' and ckan_admin_api_token_needs_rotation

- name: Rebuild Solr search index
  kubernetes.core.k8s_exec:
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
    pod: "{{ ckan_pods.resources[0].metadata.name }}"
    command: ckan --config /etc/ckan/production.ini search-index rebuild
  become: false

- name: Setup backup job
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'templates/kubernetes/{{ item }}') | from_yaml_all|list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  when: fjelltopp_env_type == 'prod'
  with_items:
    - db_backup_cronjob.yaml

- name: Setup db restore job
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'templates/kubernetes/{{ item }}') | from_yaml_all|list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  when: fjelltopp_env_type != 'prod' and restore_production_backup
  with_items:
    - db_restore_cronjob.yaml

- name: Check if CKAN returns 200 (20 tries, 60 sec interval)
  uri:
    url: "http://{{ ckan_fqdn }}"
  register: website_get_result
  until: "website_get_result.status == 200"
  retries: 20
  delay: 60
  when: fjelltopp_env_type == 'local'
