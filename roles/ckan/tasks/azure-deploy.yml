---
# CKAN deployment to shared AKS cluster
# Uses shared_* vars for cluster/ACR/vault, env_* vars for storage/DB

- name: Get subscription_id for later
  azure.azcollection.azure_rm_subscription_info:
    all: true
  register: subscription_output

- name: Get AKS admin credentials
  azure_rm_resource:
    url: "/subscriptions/{{ subscription_output.subscriptions[0].subscription_id }}/resourceGroups/{{ shared_resource_group_name }}/providers/Microsoft.ContainerService/managedClusters/{{ shared_aks_name }}/listClusterAdminCredential"
    api_version: "2023-01-01"
    method: POST
    body: {}
  register: aks_credentials

- name: Ensure .kube directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.kube"
    state: directory
    mode: '0700'

- name: Write kubeconfig for this cluster
  copy:
    content: "{{ aks_credentials.response.kubeconfigs[0].value | b64decode }}"
    dest: "{{ lookup('env', 'HOME') }}/.kube/{{ shared_aks_name }}_config"
    mode: '0600'

- name: Set kubeconfig path
  set_fact:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/{{ shared_aks_name }}_config"

- name: Create CKAN namespace
  kubernetes.core.k8s:
    name: "{{ application_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: "{{ kubeconfig }}"
  become: false

- name: Get ACR password from Key Vault
  azure.azcollection.azure_rm_keyvaultsecret_info:
    vault_uri: "https://{{ shared_vault_name }}.vault.azure.net"
    name: acr-password
  register: acr_secret

- name: Create ACR imagePullSecret
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig }}"
    namespace: "{{ application_namespace }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: acr-secret
      type: kubernetes.io/dockerconfigjson
      stringData:
        .dockerconfigjson: "{{ {'auths': {shared_acr_name + '.azurecr.io': {'username': shared_acr_name, 'password': acr_secret.secrets[0].secret, 'auth': (shared_acr_name + ':' + acr_secret.secrets[0].secret) | b64encode}}} | to_json }}"
  become: false

- set_fact:
    storage_class_name: azureblob-nfs-premium

- name: Get datalake info
  azure.azcollection.azure_rm_storageaccount_info:
    resource_group: "{{ shared_resource_group_name }}"
    name: "{{ env_storage_account_name }}"
  register: datalake_info_output_raw

- name: Show database info
  command: >
    az postgres flexible-server show \
      --resource-group {{ shared_resource_group_name }} \
      --name "{{ env_db_server_name }}"
  register: database_info_output_raw

- set_fact:
    db_fqdn: "{{ (database_info_output_raw.stdout|from_json).fullyQualifiedDomainName }}"

- set_fact:
    ckan_sqlalchemy_url: "postgresql://{{ azure_db_admin_username }}:{{ azure_db_admin_password }}@{{ db_fqdn }}/ckan"
    disk_prefix: "/subscriptions/{{ subscription_output.subscriptions[0].subscription_id }}/resourceGroups/{{ shared_node_group_name }}/providers/Microsoft.Compute/disks/{{ shared_aks_name }}-disk-"
    ckan_datastore_read_url: "postgresql://datastore_ro:{{ ckan_ds_ro_pass }}@{{ db_fqdn }}/datastore"
    ckan_datastore_write_url: "postgresql://datastore:{{ ckan_ds_rw_pass }}@{{ db_fqdn }}/datastore"

- name: Get Storage connection string
  azure.azcollection.azure_rm_storageaccount_info:
    resource_group: "{{ shared_resource_group_name }}"
    name: "{{ env_storage_account_name }}"
    show_connection_string: true
  register: storage_account_info
  when: fjelltopp_cloud_provider == 'azure'

- set_fact:
    giftless_azure_blob_string: "{{ storage_account_info.storageaccounts[0].primary_endpoints.blob.connectionstring }}"
  when: fjelltopp_cloud_provider == 'azure'

- name: Init CKAN schema
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', lookup('first_found', ['templates/kubernetes/aks/' + item, 'templates/kubernetes/' + item])) | from_yaml_all | list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  with_items:
    - ckandb_job.yaml

- name: Deploy CKAN
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', lookup('first_found', ['templates/kubernetes/aks/' + item, 'templates/kubernetes/' + item])) | from_yaml_all | list }}"
    namespace: "{{ application_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  become: false
  with_items:
    - solr.yaml
    - datapusher.yaml
    - redis.yaml
    - giftless.yaml
    - ckan_volumes.yaml
    - ckan.yaml
    - ckan_ingress.yaml
    - ckan_cronjob.yaml
