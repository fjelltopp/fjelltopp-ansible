---
# Per-environment secrets in shared Key Vault
# Secret names are prefixed with environment code (s- or p-)
# Some secrets are shared and don't have a prefix

- name: Set environment prefix for secrets
  set_fact:
    secret_prefix: "{{ resource_group_environment | lower }}"

- name: Set list of per-environment secrets
  set_fact:
    secrets:
      # ANSIBLE_NAME: AZURE_KEYVAULT_NAME (with env prefix)
      ckan_ds_ro_pass: "{{ secret_prefix }}-ckan-ds-ro-pass"
      ckan_ds_rw_pass: "{{ secret_prefix }}-ckan-ds-rw-pass"
      ckan_postgres_password: "{{ secret_prefix }}-ckan-postgres-password"
      ckan_beaker_secret: "{{ secret_prefix }}-ckan-beaker-secret"
      ckan_api_secret: "{{ secret_prefix }}-ckan-api-secret"
      ckan_admin_api_token: "{{ secret_prefix }}-ckan-api-key-datapusher"
      ckan_googleanalytics_private_key: "{{ secret_prefix }}-ckan-googleanalytics-private-key"
      ckan_secret_key: "{{ secret_prefix }}-ckan-secret-key"

- name: Set list of shared secrets (no prefix)
  set_fact:
    shared_secrets:
      azure_db_admin_password: azure-db-admin-password
      ckan_superuser_password: ckan-superuser-password

- name: Init missing secrets
  block:
    # Key Vault URI follows standard pattern
    - name: Set key vault URI fact
      set_fact:
        keyvaulturi: "https://{{ shared_vault_name }}.vault.azure.net/"

    # Initialize per-environment secrets
    - name: loop through per-environment secrets
      include_tasks: roles/azure-secrets/azure-keyvault-loop-secrets.yml
      loop: "{{ secrets | dict2items(key_name='secret_key', value_name='vault_secret_key')  }}"

    # Initialize shared secrets
    - name: loop through shared secrets
      include_tasks: roles/azure-secrets/azure-keyvault-loop-secrets.yml
      loop: "{{ shared_secrets | dict2items(key_name='secret_key', value_name='vault_secret_key')  }}"

    - name: Handle JWT Keys
      block:
        # JWT Keys are per-environment
        - name: JWT Keys Lookup
          command: >
            az keyvault secret show
            --vault-name {{ shared_vault_name }}
            --name {{ secret_prefix }}-jwt-key
            --query value -o tsv
          register: jwt_key_result
          failed_when: false
          changed_when: false

        - name: JWT Public Keys Lookup
          command: >
            az keyvault secret show
            --vault-name {{ shared_vault_name }}
            --name {{ secret_prefix }}-jwt-public-key
            --query value -o tsv
          register: jwt_public_key_result
          failed_when: false
          changed_when: false

        # If secret was not found, generate it, set it and save
        - name: Generate JWT keys
          community.crypto.openssl_privatekey:
            path: /tmp/jwt_ssh_rsa
            type: RSA
            size: 4096
            force: true
            return_content: true
          register: new_jwt_key
          when: jwt_key_result.rc != 0

        - name: Export JWT public key in PEM format
          community.crypto.openssl_publickey:
            privatekey_path: /tmp/jwt_ssh_rsa
            path: /tmp/jwt_rsa_public_key
            return_content: true
            force: true
          register: new_jwt_public_key
          when: jwt_key_result.rc != 0

        - name: Save JWT to KeyVault
          command: >
            az keyvault secret set
            --vault-name {{ shared_vault_name }}
            --name {{ secret_prefix }}-jwt-key
            --file /tmp/jwt_ssh_rsa
          when: jwt_key_result.rc != 0

        - name: Save JWT Public to KeyVault
          command: >
            az keyvault secret set
            --vault-name {{ shared_vault_name }}
            --name {{ secret_prefix }}-jwt-public-key
            --file /tmp/jwt_rsa_public_key
          when: jwt_key_result.rc != 0

        # If secret was not found, set the new secret value
        - name: Set secret value (new)
          set_fact:
            ckan_jwt_private_key: "{{ new_jwt_key.privatekey }}"
            ckan_jwt_public_key: "{{ new_jwt_public_key.publickey }}"
          when: jwt_key_result.rc != 0

        # If secret was found, set the secret value
        - name: Set secret value (existing)
          set_fact:
            ckan_jwt_private_key: "{{ jwt_key_result.stdout }}"
            ckan_jwt_public_key: "{{ jwt_public_key_result.stdout }}"
          when: jwt_key_result.rc == 0

      when: ckan_jwt_private_key is not defined

  become: false
  when: fjelltopp_env_type != 'local'
