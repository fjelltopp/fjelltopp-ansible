# MAKE SURE THE CERT PROVIDED HAS THE FULL INTERMEDIATE CHAIN
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripgiftlessprefix
  namespace: {{ application_namespace }}
spec:
  stripPrefix:
    prefixes:
      - "/giftless"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-content-type
  namespace: {{ application_namespace }}
spec:
  headers:
    customResponseHeaders:
      Content-Type: ""
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  generation: 1
  name: giftless-ingress
  namespace: {{ application_namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: {{ application_namespace }}-stripgiftlessprefix@kubernetescrd,{{ application_namespace }}-strip-content-type@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
     - hosts:
        - {{ ckan_tls_name }}
       secretName: {{ ckan_tls_name }}-tls-cert
  ingressClassName: traefik
  rules:
  - host: {{ ckan_tls_name }}
    http:
      paths:
      - backend:
          service:
            name: giftless
            port:
              number: 5001
        path: /giftless
        pathType: Prefix
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  generation: 1
  name: ckan-ingress
  namespace: {{ application_namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
     - hosts:
        - {{ ckan_tls_name }}
       secretName: {{ ckan_tls_name }}-tls-cert
  ingressClassName: traefik
  rules:
  - host: {{ ckan_tls_name }}
    http:
      paths:
      - backend:
          service:
            name: ckan
            port:
              number: 5000
        path: /
        pathType: Prefix
