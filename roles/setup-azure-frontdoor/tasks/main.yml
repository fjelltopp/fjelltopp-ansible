# Shared Front Door infrastructure - run once
# Creates profile, WAF policy, and rulesets
# Endpoints and origins are created per-environment in endpoints.yml

- name: Get subscription_id for later
  azure.azcollection.azure_rm_subscription_info:
    all: true
  register: subscription_output

- name: Set FrontDoor Profile Name
  set_fact:
    afd_profile_name: "{{ shared_afd_profile_name }}"

- set_fact:
    waf_policy_name: "{{ shared_alphanumeric_prefix }}wafpolicy"

- name: Create Front Door Profile
  command: >
    az afd profile create \
    --profile-name {{ afd_profile_name }} \
    --resource-group {{ shared_resource_group_name }} \
    --sku Standard_AzureFrontDoor

- name: Build Bicep to ARM template
  command: az bicep build --file {{ role_path }}/wafpolicy.bicep --outfile /tmp/wafpolicy.json

- name: Create Policy for WAF
  azure.azcollection.azure_rm_deployment:
    resource_group: "{{ shared_resource_group_name }}"
    location: "{{ azure_region }}"
    name: WAFDeployment
    template: "{{ lookup('file', '/tmp/wafpolicy.json') | from_json }}"
    parameters:
      frontdoorwebapplicationfirewallpolicies_wafpolicy_name:
        value: "{{ waf_policy_name }}"

- name: Create Ruleset for caching resources in the browser
  command: >
    az afd rule-set create \
      --resource-group {{ shared_resource_group_name }} \
      --profile-name {{ afd_profile_name }} \
      --rule-set-name BrowserStaticAssetCaching

- set_fact:
    asset_extensions:
      ["js", "css", "woff", "svg", "jpg", "woff2", "jpeg", "png"]

- name: Create Rule for caching resources in the browser
  command: >
    az afd rule create \
      --resource-group {{ shared_resource_group_name }} \
      --rule-set-name BrowserStaticAssetCaching \
      --profile-name {{ afd_profile_name }} \
      --rule-name staticassets \
      --match-variable UrlFileExtension \
      --operator Equal \
      --match-values {{ asset_extensions | join(' ') }} \
      --action-name ModifyResponseHeader \
      --header-action Overwrite \
      --header-name Cache-Control \
      --header-value 'public, max-age=604800'

- name: Add a ruleset for CORS headers (used by Giftless)
  command: >
    az afd rule-set create \
     --resource-group {{ shared_resource_group_name }} \
     --rule-set-name giftlesscors \
     --profile-name {{ afd_profile_name }}
