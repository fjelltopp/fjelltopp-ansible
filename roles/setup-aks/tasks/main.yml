# Creates shared AKS cluster and VNet
# Storage account creation moved to storage.yml (per-environment)

- name: Get tenant_id
  command: az account show --query tenantId -o tsv
  register: tenant_id_output
  changed_when: false

- name: Set tenant_id fact
  set_fact:
    azure_tenant_id: "{{ tenant_id_output.stdout | trim }}"

- name: Create Virtual Network for AKS
  command: >
    az network vnet create
    --resource-group {{ shared_resource_group_name }}
    --name {{ shared_vnet_name }}
    --address-prefix {{ vpc_cidr_block }}
    --location {{ azure_region }}
  register: vnet_output

- name: Create NSG for AKS subnet
  command: >
    az network nsg create
    --resource-group {{ shared_resource_group_name }}
    --name {{ shared_aks_name }}-nsg
    --location {{ azure_region }}
  register: nsg_result
  failed_when: nsg_result.rc != 0 and 'already exists' not in nsg_result.stderr

- name: Allow HTTP from Front Door only
  command: >
    az network nsg rule create
    --resource-group {{ shared_resource_group_name }}
    --nsg-name {{ shared_aks_name }}-nsg
    --name AllowFrontDoorHTTP
    --priority 100
    --direction Inbound
    --access Allow
    --protocol Tcp
    --source-address-prefixes AzureFrontDoor.Backend
    --destination-port-ranges 80
    --description "Allow HTTP from Azure Front Door"
  register: nsg_rule_http
  failed_when: nsg_rule_http.rc != 0 and 'already exists' not in nsg_rule_http.stderr

- name: Allow HTTPS from Front Door only
  command: >
    az network nsg rule create
    --resource-group {{ shared_resource_group_name }}
    --nsg-name {{ shared_aks_name }}-nsg
    --name AllowFrontDoorHTTPS
    --priority 110
    --direction Inbound
    --access Allow
    --protocol Tcp
    --source-address-prefixes AzureFrontDoor.Backend
    --destination-port-ranges 443
    --description "Allow HTTPS from Azure Front Door"
  register: nsg_rule_https
  failed_when: nsg_rule_https.rc != 0 and 'already exists' not in nsg_rule_https.stderr

- name: Allow Giftless port from Front Door only
  command: >
    az network nsg rule create
    --resource-group {{ shared_resource_group_name }}
    --nsg-name {{ shared_aks_name }}-nsg
    --name AllowFrontDoorGiftless
    --priority 120
    --direction Inbound
    --access Allow
    --protocol Tcp
    --source-address-prefixes AzureFrontDoor.Backend
    --destination-port-ranges 5001
    --description "Allow Giftless port from Azure Front Door"
  register: nsg_rule_giftless
  failed_when: nsg_rule_giftless.rc != 0 and 'already exists' not in nsg_rule_giftless.stderr

- name: Deny direct HTTP access
  command: >
    az network nsg rule create
    --resource-group {{ shared_resource_group_name }}
    --nsg-name {{ shared_aks_name }}-nsg
    --name DenyDirectHTTP
    --priority 200
    --direction Inbound
    --access Deny
    --protocol Tcp
    --source-address-prefixes Internet
    --destination-port-ranges 80 443 5001
    --description "Deny direct HTTP/HTTPS access bypassing Front Door"
  register: nsg_rule_deny
  failed_when: nsg_rule_deny.rc != 0 and 'already exists' not in nsg_rule_deny.stderr

- name: Create or update subnet for AKS
  command: >
    az network vnet subnet create
    --resource-group {{ shared_resource_group_name }}
    --vnet-name {{ shared_vnet_name }}
    --name sb_internal_01_aks
    --address-prefix {{ vpc_cidr_subnet1 }}
    --disable-private-endpoint-network-policies true
    --disable-private-link-service-network-policies true
    --service-endpoints Microsoft.Storage
    --network-security-group {{ shared_aks_name }}-nsg
  register: subnet_output

- name: Get subnet ID
  command: >
    az network vnet subnet show
    --resource-group {{ shared_resource_group_name }}
    --vnet-name {{ shared_vnet_name }}
    --name sb_internal_01_aks
    --query id -o tsv
  register: subnet_id_output
  changed_when: false

- name: Set subnet_id fact
  set_fact:
    aks_subnet_id: "{{ subnet_id_output.stdout | trim }}"

- name: Check if AKS cluster exists
  command: >
    az aks show
    --resource-group {{ shared_resource_group_name }}
    --name {{ shared_aks_name }}
    --query name -o tsv
  register: aks_exists
  failed_when: false
  changed_when: false

- name: Create AKS Cluster
  command: >
    az aks create
    --resource-group {{ shared_resource_group_name }}
    --name {{ shared_aks_name }}
    --node-resource-group {{ shared_node_group_name }}
    --dns-name-prefix {{ shared_alphanumeric_prefix }}
    --kubernetes-version {{ k8s_version }}
    --enable-managed-identity
    --network-plugin azure
    --vnet-subnet-id {{ aks_subnet_id }}
    --nodepool-name system
    --node-count 1
    --node-vm-size standard_d2s_v3
    --generate-ssh-keys
  when: aks_exists.rc != 0

- name: Add default nodepool
  command: >
    az aks nodepool add
    --resource-group {{ shared_resource_group_name }}
    --cluster-name {{ shared_aks_name }}
    --name default
    --node-count {{ worker_nodes_desired }}
    --enable-cluster-autoscaler
    --min-count {{ worker_nodes_min }}
    --max-count {{ worker_nodes_max }}
    --node-vm-size {{ worker_instance_type }}
    --vnet-subnet-id {{ aks_subnet_id }}
  register: nodepool_result
  failed_when: nodepool_result.rc != 0 and 'already exists' not in nodepool_result.stderr
  when: aks_exists.rc != 0

- name: Enable Blob Driver on AKS
  azure_rm_resource:
    resource_group: "{{ shared_resource_group_name }}"
    provider: ContainerService
    resource_type: managedClusters
    resource_name: "{{ shared_aks_name }}"
    api_version: "2023-01-01"
    method: PATCH
    body:
      properties:
        storageProfile:
          blobCSIDriver:
            enabled: true

- name: Get ACR password
  command: >
    az acr credential show
    --name {{ shared_acr_name }}
    --query "passwords[0].value" -o tsv
  register: acr_password_output
  changed_when: false

- name: Store ACR credentials in Key Vault
  command: >
    az keyvault secret set
    --vault-name {{ shared_vault_name }}
    --name acr-password
    --value "{{ acr_password_output.stdout | trim }}"
  register: acr_secret_result
  changed_when: "'created' in acr_secret_result.stdout or 'updated' in acr_secret_result.stdout"

- name: Get AKS managed identity principal ID
  command: >
    az aks show
    --resource-group {{ shared_resource_group_name }}
    --name {{ shared_aks_name }}
    --query identity.principalId -o tsv
  register: aks_identity_output
  changed_when: false

- name: Set AKS principal ID fact
  set_fact:
    aks_sp: "{{ aks_identity_output.stdout | trim }}"

- name: Grant AKS access to Key Vault secrets
  azure_rm_resource:
    resource_group: "{{ shared_resource_group_name }}"
    provider: KeyVault
    resource_type: vaults
    resource_name: "{{ shared_vault_name }}"
    subresource:
      - type: accessPolicies
        name: add
    api_version: "2023-07-01"
    method: PUT
    body:
      properties:
        accessPolicies:
          - tenantId: "{{ azure_tenant_id }}"
            objectId: "{{ aks_sp }}"
            permissions:
              secrets:
                - get
                - list
