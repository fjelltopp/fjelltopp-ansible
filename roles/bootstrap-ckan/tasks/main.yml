- name: Get CKAN pods
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ application_namespace }}"
    label_selectors:
      - app=ckan
    field_selectors:
      - status.phase=Running
    kubeconfig: "{{ kubeconfig | default(lookup('env', 'HOME') + '/.kube/config') }}"
  register: ckan_pods

- name: Set CKAN pod name
  set_fact:
    ckan_pod: "{{ ckan_pods.resources[0].metadata.name }}"

# Use some shell stuff to pipe the password into the interactive prompt
- name: Create CKAN Superuser
  kubernetes.core.k8s_exec:
    namespace: "{{ application_namespace }}"
    pod: "{{ ckan_pod }}"
    command: >
      bash -c "ckan --config=/etc/ckan/production.ini sysadmin add {{ ckan_superuser_name }} email={{ ckan_superuser_email }} name={{ ckan_superuser_name }} <<< $'Y\n{{ ckan_superuser_password }}\n{{ ckan_superuser_password }}'"
    kubeconfig: "{{ kubeconfig | default(lookup('env', 'HOME') + '/.kube/config') }}"
  register: ckan_superuser_output
